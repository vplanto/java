<!DOCTYPE html>
<html lang="{{ page.lang | default: "uk" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: "Lectures" }}</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-light.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

  <style>
    /* Центрування сторінки */
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 45px;
    }
    @media (max-width: 767px) { .markdown-body { padding: 15px; } }
  </style>

  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <article class="markdown-body">
    {{ content }}
  </article>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

    // Налаштування
    mermaid.initialize({ startOnLoad: false });

    // Знаходимо всі блоки коду з мовою mermaid і перетворюємо їх
    document.addEventListener('DOMContentLoaded', () => {
      const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');

      mermaidBlocks.forEach((block) => {
        // Отримуємо сам код діаграми
        const content = block.textContent;
        // Створюємо новий div
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = content;

        // Замінюємо <pre><code> на <div class="mermaid">
        const pre = block.closest('pre');
        if (pre) {
          pre.parentNode.replaceChild(div, pre);
        }
      });

      // Запускаємо рендер
      mermaid.run();
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>document.addEventListener('DOMContentLoaded', (event) => { hljs.highlightAll(); });</script>
</body>
</html>
